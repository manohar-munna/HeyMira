{% extends "base.html" %}
{% block title %}Register - HeyMira{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="hero-glow"></div>
    <div class="auth-card glass-card">
        <a href="/" class="back-link">← Back to home</a>
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join HeyMira and find your perfect companion</p>

        <div class="error-message" id="error-msg"></div>

        <form id="register-form" onsubmit="return false;">


            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;" id="register-btn">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
