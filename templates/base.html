<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HeyMira - AI-Based Therapy Support System. Your emotionally intelligent companion.">
    <title>{% block title %}HeyMira{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="theme-calm-night" id="app-body">
    {% block body %}{% endblock %}

    <div class="toast-container" id="toast-container"></div>

    <!-- Custom Confirmation Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content glass-card" style="max-width: 400px; text-align: center;">
            <h3 id="confirm-title" style="margin-bottom: 12px;">Confirm Action</h3>
            <p id="confirm-message" style="color: var(--text-secondary); margin-bottom: 24px; font-size: 0.95rem;">Are you sure you want to proceed?</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn btn-secondary btn-sm" id="confirm-cancel-btn" style="flex: 1;">Cancel</button>
                <button class="btn btn-danger btn-sm" id="confirm-ok-btn" style="flex: 1;">Yes, Proceed</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}?v=1.1"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
