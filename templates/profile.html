{% extends "base.html" %}
{% block title %}My Profile - HeyMira{% endblock %}

{% block body %}
<!-- Navigation overlay (similar to upload or chat sidebar links) -->
<nav style="position:fixed;top:20px;left:20px;z-index:100;display:flex;gap:10px;">
    <a href="/chat" class="btn btn-secondary" style="padding:8px 16px;text-decoration:none;">← Back to Chat</a>
</nav>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
    <div class="glass-card" style="width:100%;max-width:500px;padding:40px;">
        <h2 style="text-align:center;margin-bottom:24px;">My Profile</h2>

        <div style="display:flex;justify-content:center;margin-bottom:24px;">
            <div id="profile-preview"
                style="width:120px;height:120px;border-radius:50%;background:var(--bg-glass);display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--text);overflow:hidden;border:2px solid var(--border);">
                ?
            </div>
        </div>

        <form id="profile-form">
            <div class="form-group">
                <label class="form-label" for="profile_image">Profile Picture (optional)</label>
                <div class="upload-area" id="drop-zone" style="margin-top:8px;">
                    <div class="upload-icon">📸</div>
                    <p style="margin-bottom:8px;">Drag & drop an image or click to select</p>
                    <input type="file" id="profile_image" name="profile_image" accept="image/*" style="display:none;"
                        onchange="previewImage(this)">
                    <button type="button" class="btn btn-secondary btn-sm"
                        onclick="document.getElementById('profile_image').click()" style="margin:0 auto;">Browse
                        Files</button>
                    <p id="file-name" style="font-size:0.8rem;margin-top:12px;color:var(--text-muted);"></p>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-input" id="username" name="username" placeholder="Your username"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label" for="age">Age</label>
                <input type="number" class="form-input" id="age" name="age" placeholder="Your age" min="1" max="120">
            </div>

            <div class="form-group">
                <label class="form-label" for="gender">Gender</label>
                <select class="form-input" id="gender" name="gender">
                    <option value="">Prefer not to say</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="non-binary">Non-binary</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" id="save-btn" style="width:100%;margin-top:12px;">
                Save Profile
            </button>
        </form>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
